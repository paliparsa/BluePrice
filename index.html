  .price-card:hover::after { opacity: 1; }
  .price-card::before { content: ''; position: absolute; top: 0; left: 0; right: 0; height: 3px; border-radius: 20px 20px 0 0; z-index: 2; }

<script>
  let siteConfig = {};
  let discountCodes = {};
  let activeDiscount = 0; // current discount percentage applied

  // =========================================================
  // THEME TOGGLE
  // =========================================================
  function toggleTheme() {
    var isLight = document.body.classList.toggle('light-theme');
    localStorage.setItem('theme', isLight ? 'light' : 'dark');
    updateThemeIcons(isLight);
  }
  function updateThemeIcons(isLight) {
    var iconClass = isLight ? 'fa-sun' : 'fa-moon';
    document.getElementById('main-theme-icon').className = 'fas ' + iconClass;
    document.getElementById('sticky-theme-icon').className = 'fas ' + iconClass;
  }
  function initTheme() {
    var savedTheme = localStorage.getItem('theme');
    if (savedTheme === 'light' || (!savedTheme && window.matchMedia('(prefers-color-scheme: light)').matches)) {
      document.body.classList.add('light-theme');
      updateThemeIcons(true);
    } else {
      updateThemeIcons(false);
    }
  }

  // =========================================================
  // LANGUAGE TOGGLE
  // =========================================================
  let currentLang = localStorage.getItem('lang') || 'fa';
  function toggleLang() {
    currentLang = currentLang === 'fa' ? 'en' : 'fa';
    localStorage.setItem('lang', currentLang);
    document.getElementById('lang-text').textContent = currentLang === 'fa' ? 'EN' : 'FA';
    document.getElementById('main-lang-text').textContent = currentLang === 'fa' ? 'EN' : 'FA';
    document.body.style.direction = currentLang === 'fa' ? 'rtl' : 'ltr';
    if (typeof siteConfig !== 'undefined' && siteConfig && Object.keys(siteConfig).length > 0) renderPage(siteConfig);
  }

  // =========================================================
  // INITIALIZATION & PREVIEW
  // =========================================================
  window.addEventListener('message', function(event) {
    if (event.data && event.data.type === 'previewConfig') {
      siteConfig = event.data.config;
      renderPage(siteConfig);
    }
  });
  initTheme();
  document.getElementById('lang-text').textContent = currentLang === 'fa' ? 'EN' : 'FA';
  document.getElementById('main-lang-text').textContent = currentLang === 'fa' ? 'EN' : 'FA';
  document.body.style.direction = currentLang === 'fa' ? 'rtl' : 'ltr';

  async function loadConfig() {
    try {
      const res = await fetch('./config.json?v=' + Date.now());
      siteConfig = await res.json();
      discountCodes = siteConfig.discountCodes || {};
      renderPage(siteConfig);
    } catch (e) {
      console.error('Could not load config.json', e);
    }
  }

  function renderPage(baseCfg) {
    // Clone config to avoid modifying original when applying overrides
    var cfg = JSON.parse(JSON.stringify(baseCfg));
    
    // Apply EN overrides if language is English
    if (currentLang === 'en' && cfg.en) {
      if (cfg.en.site) Object.assign(cfg.site, cfg.en.site);
      if (cfg.en.announcement) Object.assign(cfg.announcement, cfg.en.announcement);
      if (cfg.en.countdown) Object.assign(cfg.countdown, cfg.en.countdown);
      if (cfg.en.telegram) Object.assign(cfg.telegram, cfg.en.telegram);
      if (cfg.en.refundBanner) cfg.refundBanner = cfg.en.refundBanner;
      if (cfg.en.features) {
        cfg.en.features.forEach((f, i) => { if (cfg.features[i]) Object.assign(cfg.features[i], f); });
      }
      if (cfg.en.faq) {
        cfg.en.faq.forEach((f, i) => { if (cfg.faq[i]) Object.assign(cfg.faq[i], f); });
      }
      if (cfg.en.tutorials) {
        cfg.en.tutorials.forEach((t, i) => { if (cfg.tutorials[i]) Object.assign(cfg.tutorials[i], t); });
      }
      if (cfg.en.reviews) {
        cfg.en.reviews.forEach((r, i) => { if (cfg.reviews[i]) Object.assign(cfg.reviews[i], r); });
      }
      if (cfg.en.plans) {
        cfg.en.plans.forEach((p, i) => {
          if (cfg.plans[i]) {
            cfg.plans[i].title = p.title || cfg.plans[i].title;
            cfg.plans[i].subtitle = p.subtitle || cfg.plans[i].subtitle;
            cfg.plans[i].note = p.note || cfg.plans[i].note;
            if (p.features) cfg.plans[i].features = p.features;
            if (p.options) {
              p.options.forEach((opt, j) => {
                if (cfg.plans[i].options[j]) Object.assign(cfg.plans[i].options[j], opt);
              });
            }
          }
        });
      }
    }

    document.title = cfg.site.title;
    document.getElementById('brand-name').textContent = cfg.site.brandName;
    document.getElementById('main-title').textContent = cfg.site.brandName;
    document.getElementById('sticky-brand').textContent = cfg.site.brandName;
    document.getElementById('capsule-text').textContent = cfg.site.capsuleText;
    document.getElementById('gift-badge-text').innerHTML = cfg.site.giftBadgeText.replace(/\n/g, '<br>');
    document.getElementById('countdown-title').innerHTML = '<i class="fas fa-fire"></i> ' + cfg.countdown.title;
    document.getElementById('refund-text').textContent = cfg.refundBanner;
    document.getElementById('tg-join-text').textContent = cfg.telegram.joinBtnText;
    document.getElementById('tgBtn').onclick = function() { window.open(cfg.telegram.channelUrl, '_blank', 'noopener,noreferrer'); };

    // Dynamic Translations for hardcoded UI elements
    document.getElementById('days').nextElementSibling.textContent = currentLang === 'en' ? 'Days' : 'روز';
    document.getElementById('hours').nextElementSibling.textContent = currentLang === 'en' ? 'Hours' : 'ساعت';
    document.getElementById('minutes').nextElementSibling.textContent = currentLang === 'en' ? 'Minutes' : 'دقیقه';
    document.getElementById('seconds').nextElementSibling.textContent = currentLang === 'en' ? 'Seconds' : 'ثانیه';
    
    document.querySelector('.sticky-cta').textContent = currentLang === 'en' ? 'Buy Plan ↓' : 'خرید پلن ↓';
    document.querySelector('.discount-label').innerHTML = currentLang === 'en' ? '<i class="fas fa-tag"></i> Have a code?' : '<i class="fas fa-tag"></i> کد تخفیف دارید؟';
    document.getElementById('discount-input').placeholder = currentLang === 'en' ? 'Example: BLUEGATE30' : 'مثال: BLUEGATE30';
    document.getElementById('discount-btn').textContent = currentLang === 'en' ? 'Apply' : 'اعمال کد';
    
    document.getElementById('faq-section-title').innerHTML = currentLang === 'en' ? '<i class="fas fa-circle-question"></i> Frequently Asked Questions' : '<i class="fas fa-circle-question"></i> سوالات متداول';
    document.getElementById('tut-title').innerHTML = currentLang === 'en' ? '<i class="fas fa-book-open"></i> Connection Guide' : '<i class="fas fa-book-open"></i> راهنمای اتصال';
    document.getElementById('rev-title').innerHTML = currentLang === 'en' ? '<i class="fas fa-star"></i> User Reviews' : '<i class="fas fa-star"></i> نظرات کاربران';
    document.getElementById('contact-title').innerHTML = currentLang === 'en' ? '<i class="fas fa-envelope"></i> Contact Us' : '<i class="fas fa-envelope"></i> تماس با ما';
    document.getElementById('contact-email').placeholder = currentLang === 'en' ? 'Your Email (optional)' : 'ایمیل شما (اختیاری)';
    document.getElementById('contact-message').placeholder = currentLang === 'en' ? 'Write your message...' : 'پیام خود را بنویسید...';
    document.getElementById('contact-submit').textContent = currentLang === 'en' ? 'Send Message' : 'ارسال پیام';

    document.getElementById('contact-handles').innerHTML =
      '<a href="' + cfg.telegram.channelUrl + '" target="_blank" rel="noopener noreferrer"><i class="fab fa-telegram"></i> ' + cfg.telegram.channelHandle + '</a>' +
      '<a href="' + cfg.telegram.supportUrl + '" target="_blank" rel="noopener noreferrer"><i class="fab fa-telegram"></i> ' + cfg.telegram.supportHandle + '</a>';

    // Announcement banner
    var ann = cfg.announcement;
    if (ann && ann.enabled && ann.text && !sessionStorage.getItem('ann_dismissed')) {
      var bannerEl = document.getElementById('announcement-banner');
      document.getElementById('announcement-text').textContent = ann.text;
      bannerEl.classList.remove('hidden');
    }

    // Analytics
    if (cfg.analytics && cfg.analytics.gaId && !window.gaLoaded) {
      window.gaLoaded = true;
      var s1 = document.createElement('script');
      s1.async = true;
      s1.src = 'https://www.googletagmanager.com/gtag/js?id=' + cfg.analytics.gaId;
      document.head.appendChild(s1);
      var s2 = document.createElement('script');
      s2.innerHTML = "window.dataLayer = window.dataLayer || []; function gtag(){dataLayer.push(arguments);} gtag('js', new Date()); gtag('config', '" + cfg.analytics.gaId + "');";
      document.head.appendChild(s2);
    }

    document.getElementById('features-row').innerHTML = cfg.features.map(function(f) {
      return '<div class="feature-box"><div class="feat-icon"><i class="fas ' + f.icon + '"></i></div><h4>' + f.title + '</h4><p>' + f.text + '</p></div>';
    }).join('');

    // Tutorials section
    var tutData = cfg.tutorials || [];
    if (tutData.length > 0) {
      document.getElementById('tutorials-section').style.display = 'block';
      var modeClass = currentLang === 'en' ? ' en-mode' : '';
      document.getElementById('tutorials-list').innerHTML = tutData.map(function(item) {
        var iconStr = item.icon ? '<i class="' + item.icon + '"></i> ' : '';
        var stepsStr = item.steps.map(function(s) { return '<li>' + s + '</li>'; }).join('');
        return '<div class="tutorial-card' + modeClass + '"><h4>' + iconStr + item.os + ' - ' + item.app + '</h4><ol>' + stepsStr + '</ol></div>';
      }).join('');
    } else {
      document.getElementById('tutorials-section').style.display = 'none';
    }

    // Reviews section
    var revData = cfg.reviews || [];
    if (revData.length > 0) {
      document.getElementById('reviews-section').style.display = 'block';
      document.getElementById('reviews-list').innerHTML = revData.map(function(item) {
        var stars = '';
        var rating = item.rating || 5;
        for(var i=0; i<5; i++) { stars += (i < rating) ? '★' : '☆'; }
        return '<div class="review-card"><div class="review-header"><span class="review-name">' + item.name + '</span><span class="review-stars">' + stars + '</span></div><div class="review-text">"' + item.text + '"</div></div>';
      }).join('');
    } else {
      document.getElementById('reviews-section').style.display = 'none';
    }

    // Contact Form
    if (cfg.contactForm && cfg.contactForm.enabled && cfg.contactForm.endpoint) {
      document.getElementById('contact-section').style.display = 'block';
      document.getElementById('contact-form').action = cfg.contactForm.endpoint;
    } else {
      document.getElementById('contact-section').style.display = 'none';
    }

    // FAQ section
    var faqData = cfg.faq || [];
    if (faqData.length > 0) {
      document.getElementById('faq-section').style.display = 'block';
      document.getElementById('faq-list').innerHTML = faqData.map(function(item, i) {
        return '<div class="faq-item" id="faq-' + i + '">' +
          '<div class="faq-q" onclick="toggleFaq(' + i + ')">' +
          '<span>' + item.q + '</span>' +
          '<i class="fas fa-chevron-down faq-chevron"></i>' +
          '</div>' +
          '<div class="faq-a">' + item.a + '</div>' +
          '</div>';
      }).join('');
    } else {
      document.getElementById('faq-section').style.display = 'none';
    }

    var delays = ['delay-1', 'delay-2', 'delay-3', 'delay-4'];
    var popularPlan = cfg.popularPlan || '';
    document.getElementById('pricing-grid').innerHTML = cfg.plans.map(function(plan, idx) {
      var delay = delays[idx] || '';
      var isPopular = plan.id === popularPlan || plan.title === popularPlan;
      var popularText = currentLang === 'en' ? 'Most Popular' : 'محبوب‌ترین';
      var popularHTML = isPopular ? '<div class="popular-badge"><i class="fas fa-fire"></i> ' + popularText + '</div>' : '';
      var popularClass = isPopular ? ' is-popular' : '';
      var featuresHTML = plan.features.length
        ? '<ul class="feature-list">' + plan.features.map(function(f) { return '<li><span class="check"><i class="fas fa-check"></i></span> ' + f + '</li>'; }).join('') + '</ul>'
        : '';
      var noteHTML = plan.note ? '<div class="card-note">' + plan.note + '</div>' : '';
      var infinityHTML = plan.isUnlimited ? '<div class="infinity-symbol">&#8734;</div>' : '';
      var shimmerHTML = plan.theme === 'gold' ? '<div class="shimmer"></div>' : '';
      var optionsHTML = plan.options.map(function(opt, i) {
        return '<div class="toggle-btn' + (i === 0 ? ' active' : '') + '" data-volume="' + opt.volume + '" data-price="' + opt.price + '">' + opt.label + '</div>';
      }).join('');

      var unitText = currentLang === 'en' ? 'Tomans' : 'تومان';
      var buyText = currentLang === 'en' ? 'Buy Plan' : 'خرید پلن';

      return '<article class="price-card card-' + plan.theme + popularClass + ' animate-in ' + delay + '" data-plan="' + plan.title + '">' +
        '<div class="card-bg"></div>' + shimmerHTML + popularHTML +
        '<span class="card-icon"><i class="fas ' + plan.icon + '"></i></span>' +
        '<h3 class="card-title">' + plan.title + '</h3>' +
        '<p class="card-subtitle">' + plan.subtitle + '</p>' +
        featuresHTML + infinityHTML +
        '<div class="price-divider"></div>' + noteHTML +
        '<div class="toggle-container" data-card="' + plan.id + '"><div class="toggle-slider"></div>' + optionsHTML + '</div>' +
        '<div class="price-display">' +
          '<span class="price-original"></span>' +
          '<div><span class="price-value">' + plan.options[0].price + '</span> <span class="unit">' + unitText + '</span></div>' +
          '<span class="savings-label"></span>' +
        '</div>' +
        '<a href="#" class="buy-btn" target="_blank"><i class="fas fa-bag-shopping"></i> ' + buyText + '</a>' +
        '</article>';
    }).join('');

    startCountdown(cfg.countdown.endDate);
    initToggles();
    initCardGlow();
    initStickyHeader();

    var subtitleEl = document.getElementById('subtitle-el');
    subtitleEl.textContent = '';
    var originalText = cfg.site.subtitle;
    var charIndex = 0;
    if (window.typeWriterTimeout) clearTimeout(window.typeWriterTimeout);
    function typeWriter() {
      if (charIndex < originalText.length) {
        subtitleEl.textContent += originalText.charAt(charIndex);
        charIndex++;
        window.typeWriterTimeout = setTimeout(typeWriter, 50);
      }
    }
    window.typeWriterTimeout = setTimeout(typeWriter, 800);
  }

  var timerInterval = null;
  function startCountdown(endDateStr) {
    if (timerInterval) clearInterval(timerInterval);
    var countDownDate = new Date(endDateStr).getTime();
    timerInterval = setInterval(function() {
      var now = new Date().getTime();
      var distance = countDownDate - now;
      if (distance < 0) { clearInterval(timerInterval); return; }
      document.getElementById("days").innerText = String(Math.floor(distance / (1000 * 60 * 60 * 24))).padStart(2, '0');
      document.getElementById("hours").innerText = String(Math.floor((distance % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60))).padStart(2, '0');
      document.getElementById("minutes").innerText = String(Math.floor((distance % (1000 * 60 * 60)) / (1000 * 60))).padStart(2, '0');
      document.getElementById("seconds").innerText = String(Math.floor((distance % (1000 * 60)) / 1000)).padStart(2, '0');
    }, 1000);
  }

  function initToggles() {
    document.querySelectorAll('.toggle-container').forEach(function(container) {
      var btns = container.querySelectorAll('.toggle-btn');
      var slider = container.querySelector('.toggle-slider');
      var card = container.closest('.price-card');
      var priceValueEl = card.querySelector('.price-value');
      var priceOrigEl = card.querySelector('.price-original');
      var savingsEl = card.querySelector('.savings-label');
      var buyBtn = card.querySelector('.buy-btn');
      var planName = card.dataset.plan;
      var supportUrl = siteConfig.telegram ? siteConfig.telegram.supportUrl : 'https://t.me/BlueGateSupport';

      function moveSlider(btn) { slider.style.left = btn.offsetLeft + 'px'; slider.style.width = btn.offsetWidth + 'px'; }
      function updateCard(btn) {
        btns.forEach(function(b) { b.classList.remove('active'); });
        btn.classList.add('active');
        moveSlider(btn);
        var rawPrice = parseInt(btn.dataset.price) || 0;
        var finalPrice = activeDiscount > 0 ? Math.round(rawPrice * (1 - activeDiscount / 100)) : rawPrice;
        priceValueEl.classList.add('animate');
        priceValueEl.textContent = finalPrice;
        setTimeout(function() { priceValueEl.classList.remove('animate'); }, 200);
        if (activeDiscount > 0 && priceOrigEl) {
          var unitStr = currentLang === 'en' ? ' Tomans' : ' تومان';
          var saveStr = currentLang === 'en' ? 'Savings: ' : 'صرفه‌جویی: ';
          priceOrigEl.textContent = rawPrice + unitStr;
          priceOrigEl.style.display = 'block';
          if (savingsEl) { savingsEl.textContent = saveStr + (rawPrice - finalPrice) + unitStr; savingsEl.style.display = 'inline-block'; }
        } else {
          if (priceOrigEl) priceOrigEl.style.display = 'none';
          if (savingsEl) savingsEl.style.display = 'none';
        }
        var textEn = 'Hello, I want to buy the ' + planName + ' plan with ' + btn.dataset.volume + ' volume.';
        var textFa = 'سلام، قصد خرید پلن ' + planName + ' با حجم ' + btn.dataset.volume + ' را دارم.';
        buyBtn.href = supportUrl + '?text=' + encodeURIComponent(currentLang === 'en' ? textEn : textFa);
      }
      btns.forEach(function(btn) { btn.addEventListener('click', function() { updateCard(btn); }); });
      var activeBtn = container.querySelector('.toggle-btn.active');
      if (activeBtn) updateCard(activeBtn);
    });
  }

  function initCardGlow() {
    document.querySelectorAll('.price-card').forEach(function(card) {
      card.addEventListener('mousemove', function(e) {
        var rect = card.getBoundingClientRect();
        card.style.setProperty('--mouse-x', (e.clientX - rect.left) + 'px');
        card.style.setProperty('--mouse-y', (e.clientY - rect.top) + 'px');
      });
    });
  }

  function showToast(message, isError) {
    var toast = document.getElementById('toast');
    var msgSpan = document.getElementById('toast-msg');
    msgSpan.textContent = message;
    toast.classList.toggle('error', !!isError);
    toast.classList.add('show');
    setTimeout(function() { toast.classList.remove('show'); }, 3000);
  }

  function applyDiscount() {
    var input = document.getElementById('discount-input');
    var code = input.value.trim().toUpperCase();
    if (!code) { showToast(currentLang === 'en' ? 'Please enter a discount code' : 'لطفا کد تخفیف را وارد کنید', true); return; }
    if (discountCodes[code] !== undefined) {
      activeDiscount = discountCodes[code];
      var msgSuccess = currentLang === 'en' ? 'Code applied! ' + activeDiscount + '% off.' : 'کد تخفیف ' + activeDiscount + '٪ با موفقیت اعمال شد! قیمت‌ها به‌روز شدند.';
      showToast(msgSuccess);
      input.style.borderColor = 'var(--neon-green)';
      input.style.boxShadow = '0 0 10px rgba(0, 255, 136, 0.4)';
      // Re-run toggles to update all displayed prices
      initToggles();
    } else {
      var msgErr = currentLang === 'en' ? 'Invalid discount code' : 'کد تخفیف نامعتبر است';
      showToast(msgErr, true);
      input.style.borderColor = 'var(--neon-red)';
      input.style.boxShadow = '0 0 10px rgba(255, 45, 85, 0.4)';
      setTimeout(function() { input.style.borderColor = 'rgba(255,255,255,0.1)'; input.style.boxShadow = 'none'; }, 2000);
    }
  }

  document.getElementById('discount-btn').addEventListener('click', applyDiscount);
  document.getElementById('discount-input').addEventListener('keypress', function(e) { if (e.key === 'Enter') applyDiscount(); });

  // Sticky header
  function initStickyHeader() {
    var hero = document.querySelector('.main-logo-section');
    var stickyEl = document.getElementById('sticky-header');
    if (!hero || !stickyEl) return;
    var observer = new IntersectionObserver(function(entries) {
      if (!entries[0].isIntersecting) { stickyEl.classList.add('visible'); }
      else { stickyEl.classList.remove('visible'); }
    }, { threshold: 0 });
    observer.observe(hero);
  }

  // Announcement dismiss
  function dismissAnnouncement() {
    document.getElementById('announcement-banner').classList.add('hidden');
    sessionStorage.setItem('ann_dismissed', '1');
  }

  // FAQ toggle
  function toggleFaq(idx) {
    var item = document.getElementById('faq-' + idx);
    if (!item) return;
    var isOpen = item.classList.contains('open');
    document.querySelectorAll('.faq-item.open').forEach(function(el) { el.classList.remove('open'); });
    if (!isOpen) item.classList.add('open');
  }

  window.addEventListener('resize', function() { initToggles(); });
  window.addEventListener('load', function() { initToggles(); });

  // Canvas Background
  var canvas = document.getElementById('bg-canvas');
  var ctx = canvas.getContext('2d');
  var particles = [], networkDots = [], w, h;

  function resize() { w = canvas.width = window.innerWidth; h = canvas.height = window.innerHeight; initNetworkDots(); }
  function initNetworkDots() {
    networkDots = [];
    var spacing = 60;
    for (var x = 0; x < w; x += spacing) {
      for (var y = 0; y < h; y += spacing) {
        networkDots.push({ x: x + (Math.random() - 0.5) * 20, y: y + (Math.random() - 0.5) * 20, baseAlpha: 0.03 + Math.random() * 0.04, phase: Math.random() * Math.PI * 2 });
      }
    }
  }
  function createParticles() {
    particles = [];
    var count = Math.min(60, Math.floor(w * h / 20000));
    for (var i = 0; i < count; i++) {
      particles.push({ x: Math.random() * w, y: Math.random() * h, vx: (Math.random() - 0.5) * 0.3, vy: (Math.random() - 0.5) * 0.3, r: Math.random() * 1.5 + 0.5, alpha: Math.random() * 0.5 + 0.1, color: Math.random() > 0.7 ? '0, 180, 255' : (Math.random() > 0.5 ? '168, 85, 247' : '0, 229, 255') });
    }
  }
  var mouse = { x: 0, y: 0 };
  document.addEventListener('mousemove', function(e) { mouse.x = e.clientX; mouse.y = e.clientY; });
  var time = 0;

  function drawFrame() {
    time += 0.01;
    ctx.clearRect(0, 0, w, h);
    var grad = ctx.createRadialGradient(w/2, h/3, 0, w/2, h/3, Math.max(w,h));
    grad.addColorStop(0, '#0d1a3a'); grad.addColorStop(0.5, '#080f28'); grad.addColorStop(1, '#040810');
    ctx.fillStyle = grad; ctx.fillRect(0, 0, w, h);
    var mg = ctx.createRadialGradient(mouse.x, mouse.y, 0, mouse.x, mouse.y, 200);
    mg.addColorStop(0, 'rgba(0,180,255,0.03)'); mg.addColorStop(1, 'rgba(0,180,255,0)');
    ctx.fillStyle = mg; ctx.fillRect(0, 0, w, h);
    for (var d of networkDots) { var a = d.baseAlpha + Math.sin(time*2+d.phase)*0.02; ctx.fillStyle='rgba(0,180,255,'+Math.max(0,a)+')'; ctx.fillRect(d.x,d.y,1.5,1.5); }
    for (var i = 0; i < particles.length; i++) {
      var p = particles[i]; p.x+=p.vx; p.y+=p.vy;
      if(p.x<0)p.x=w; if(p.x>w)p.x=0; if(p.y<0)p.y=h; if(p.y>h)p.y=0;
      ctx.beginPath(); ctx.arc(p.x,p.y,Math.max(0.1,p.r),0,Math.PI*2); ctx.fillStyle='rgba('+p.color+','+p.alpha+')'; ctx.fill();
      ctx.beginPath(); ctx.arc(p.x,p.y,Math.max(0.1,p.r*3),0,Math.PI*2); ctx.fillStyle='rgba('+p.color+','+(p.alpha*0.15)+')'; ctx.fill();
      for (var j=i+1;j<particles.length;j++){
        var p2=particles[j],dx=p.x-p2.x,dy=p.y-p2.y;
        if(Math.abs(dx)<120&&Math.abs(dy)<120){var ds=dx*dx+dy*dy;if(ds<14400){var dist=Math.sqrt(ds),al=(1-dist/120)*0.08;ctx.strokeStyle='rgba(0,180,255,'+al+')';ctx.lineWidth=0.5;ctx.beginPath();ctx.moveTo(p.x,p.y);ctx.lineTo(p2.x,p2.y);ctx.stroke();}}
      }
    }
    requestAnimationFrame(drawFrame);
  }
  window.addEventListener('resize', function() { resize(); createParticles(); });
  resize(); createParticles(); drawFrame();

  loadConfig();
  initTheme();
  
  // Register Service Worker for PWA
  if ('serviceWorker' in navigator) {
    window.addEventListener('load', function() {
      navigator.serviceWorker.register('sw.js').then(function(registration) {
        console.log('ServiceWorker registration successful with scope: ', registration.scope);
      }, function(err) {
        console.log('ServiceWorker registration failed: ', err);
      });
    });
  }
</script>
